name: Build and Deploy AI Report Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build \
            -t asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ai-report-service/ai-report-service:latest .

      - name: Push Docker Image
        run: |
          docker push \
            asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ai-report-service/ai-report-service:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ai-report-service \
            --image asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ai-report-service/ai-report-service:latest \
            --region asia-southeast1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --service-account ai-report-service@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},LOCATION=asia-southeast1,GEMINI_MODEL=gemini-2.5-flash